<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Preparation - Mock Tests</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app"></div>

  <button class="edit-toggle" id="editToggle" style="display:none">Edit Data</button>

  <div class="edit-panel" id="editPanel">
    <div class="edit-panel-header">
      <span>Edit JSON Data</span>
      <button id="closeEdit">&times;</button>
    </div>
    <textarea id="jsonEditor" spellcheck="false"></textarea>
    <div class="edit-panel-footer">
      <button id="cancelEdit">Cancel</button>
      <button class="save" id="saveEdit">Apply Changes</button>
    </div>
  </div>

  <div class="edit-toast" id="editToast"></div>

  <script src="script.js"></script>
</body>
</html>
